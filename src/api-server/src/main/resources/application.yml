server:
  port: 8080

spring:
  application:
    name: api-server
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/newspaper?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: ${MAIL_HOST:imap.naver.com}
    port: ${MAIL_PORT:993}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        store:
          protocol: imaps
        imaps:
          ssl:
            enable: true
            trust: "*"

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

cloud:
  aws:
    credentials:
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
    s3:
      endpoint: ${CLOUD_AWS_S3_ENDPOINT:http://localhost:9000}
      bucket: ${MINIO_BUCKET:newspaper-bucket}
    region:
      static: ${MINIO_REGION:us-east-1}
    stack:
      auto: false

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  enabled: ${GEMINI_ENABLED:true}