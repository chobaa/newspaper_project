name: Deploy to Local Server

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때마다 실행

jobs:
  build-and-deploy:
    runs-on: self-hosted # 아까 등록한 내 컴퓨터에서 실행해라!

    steps:
      # 1. 코드 내려받기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 자바 17 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 스프링 부트 빌드 (JAR 파일 생성)
      # 윈도우라서 gradlew.bat 사용 (리눅스면 ./gradlew)
      - name: Build with Gradle
        run: |
          cd api-server
          .\gradlew.bat bootJar

      # 4. 도커 컨테이너 재배포
      # 기존 백엔드만 내렸다가 -> 다시 빌드해서 -> 올림
      - name: Deploy with Docker Compose
        run: |
          docker-compose down backend
          docker-compose up -d --build backend
          docker image prune -f # 안 쓰는 이미지 찌꺼기 청소