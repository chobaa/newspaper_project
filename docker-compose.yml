version: '3.8'

services:
  # 1. 프론트엔드 + Nginx (Primary: 80, Secondary: 8081)
  frontend:
    container_name: newspaper-frontend
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
    ports:
      - "80:80"
      - "8081:8081"
    depends_on:
      - backend
    restart: always

  # 2. 백엔드 서버
  backend:
    container_name: newspaper-api
    build: ./src/api-server  # api-server 폴더에 있는 Dockerfile을 보고 빌드해라
    env_file:
      - .env  # .env에 있는 변수(MAIL_USERNAME, MAIL_PASSWORD 등)를 컨테이너에 주입
    ports:
      - "8080:8080"
    environment:
      # 도커 내부에서는 'localhost' 대신 서비스 이름(db)을 써야 통신이 됨
      - SPRING_DATASOURCE_URL=jdbc:mysql://newspaper-db:3306/newspaper?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

      - AWS_REGION=us-east-1
      - CLOUD_AWS_S3_ENDPOINT=http://minio:9000
    depends_on:
      - db
      - minio
    restart: always

  # 3. 데이터베이스
  db:
    image: mysql:8.0
    container_name: newspaper-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: newspaper
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql

  # 4. 오브젝트 스토리지
  minio:
    image: minio/minio
    container_name: newspaper-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data