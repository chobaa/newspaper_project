upstream backend {
    server backend:8080;
    keepalive 32;
}

# 로컬/직접 접속용 (localhost, IP) — SSL 없이 80으로 서비스
server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    client_max_body_size 50M;

    root /usr/share/nginx/html/primary;
    index index.html;

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 프로덕션 도메인: HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name xn--vg1b002am5bc0y3ga.com www.xn--vg1b002am5bc0y3ga.com;
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (443)
server {
    listen 443 ssl;
    server_name xn--vg1b002am5bc0y3ga.com www.xn--vg1b002am5bc0y3ga.com;
    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/xn--vg1b002am5bc0y3ga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--vg1b002am5bc0y3ga.com/privkey.pem;

    root /usr/share/nginx/html/primary;
    index index.html;

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 8081 유지
server {
    listen 8081;
    server_name localhost;
    client_max_body_size 50M;
    root /usr/share/nginx/html/secondary;
    index index.html;

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}